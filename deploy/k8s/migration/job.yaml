apiVersion: batch/v1
kind: Job
metadata:
  name: grocery-migrate
  namespace: grocery
  labels:
    app.kubernetes.io/name: grocery-app
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grocery-app
        app.kubernetes.io/component: migration
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: grocery-app-image
          imagePullPolicy: IfNotPresent
          command:
            - npm
            - run
            - db:migrate:deploy
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database
                  key: DATABASE_URL
          volumeMounts:
            - name: postgres-ca
              mountPath: /var/run/postgres-ca
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: postgres-ca
          configMap:
            name: postgres-ca
