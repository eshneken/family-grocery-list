apiVersion: batch/v1
kind: Job
metadata:
  name: grocery-bootstrap
  namespace: grocery
  labels:
    app.kubernetes.io/name: grocery-app
    app.kubernetes.io/component: bootstrap
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grocery-app
        app.kubernetes.io/component: bootstrap
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bootstrap
          image: grocery-app-image
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - >-
              exec npm run db:bootstrap --
              --admin-email "$INITIAL_ADMIN_EMAIL"
              --household-name "$INITIAL_HOUSEHOLD_NAME"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database
                  key: DATABASE_URL
            - name: INITIAL_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: grocery-bootstrap-config
                  key: INITIAL_ADMIN_EMAIL
            - name: INITIAL_HOUSEHOLD_NAME
              valueFrom:
                secretKeyRef:
                  name: grocery-bootstrap-config
                  key: INITIAL_HOUSEHOLD_NAME
          volumeMounts:
            - name: postgres-ca
              mountPath: /var/run/postgres-ca
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: postgres-ca
          configMap:
            name: postgres-ca
