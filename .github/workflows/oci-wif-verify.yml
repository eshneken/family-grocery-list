name: Verify OCI workload identity

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    name: Exchange GitHub OIDC token for OCI credentials
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/setup-oci-wif
        with:
          domain-url: ${{ vars.OCI_WIF_DOMAIN_URL }}
          client-id: ${{ vars.OCI_WIF_CLIENT_ID }}
          client-secret: ${{ secrets.OCI_WIF_CLIENT_SECRET }}
          audience: ${{ vars.OCI_WIF_AUDIENCE }}
          service-user-ocid: ${{ vars.OCI_WIF_SERVICE_USER_OCID }}
          tenancy-ocid: ${{ vars.OCI_TENANCY_OCID }}
          region: ${{ vars.OCI_REGION }}
      - name: Record verification
        shell: bash
        run: |
          {
            echo '### OCI WIF verification passed'
            echo 'GitHub exchanged its OIDC token for an OCI security token and completed a read-only Object Storage namespace request.'
          } >> "$GITHUB_STEP_SUMMARY"
